requires_approval = false
credential_bindings = []

[[tools]]
name = "barcode_lookup"
description = "Look up product by barcode"
risk_class = "read_only"
requires_approval = false
credential_bindings = []

[[tools]]
name = "loyalty_check"
description = "Check loyalty points"
risk_class = "read_only"
requires_approval = false
